<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <style>
      .zone-public { fill: #ffcdd2; stroke: #c62828; stroke-width: 3; }
      .zone-dmz { fill: #fff9c4; stroke: #f57f17; stroke-width: 3; }
      .zone-internal { fill: #c8e6c9; stroke: #2e7d32; stroke-width: 3; }
      .zone-local { fill: #bbdefb; stroke: #1565c0; stroke-width: 3; }
      .text-title { font-family: Arial, sans-serif; font-size: 18px; fill: #333; font-weight: bold; }
      .text-normal { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .text-small { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
      .arrow { stroke: #333; stroke-width: 3; fill: none; marker-end: url(#arrowhead); }
      .arrow-thick { stroke: #d32f2f; stroke-width: 4; fill: none; marker-end: url(#arrowhead-red); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#d32f2f" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" class="text-title" text-anchor="middle">Empfohlene Firewall-Architektur für Pi5</text>

  <!-- Internet Zone -->
  <rect x="50" y="60" width="800" height="100" class="zone-public" rx="10"/>
  <text x="450" y="90" class="text-title" text-anchor="middle">Internet (Öffentliche Zone)</text>
  <text x="450" y="115" class="text-normal" text-anchor="middle">Unvertrauenswürdig - Alle Zugriffe gefiltert</text>
  <text x="450" y="140" class="text-small" text-anchor="middle">Nur Port 443 (HTTPS) erlaubt</text>

  <!-- Arrow down -->
  <line x1="450" y1="160" x2="450" y2="190" class="arrow-thick"/>
  <text x="480" y="180" class="text-small" fill="#d32f2f" font-weight="bold">Port 443</text>

  <!-- Router/Firewall -->
  <rect x="350" y="190" width="200" height="50" fill="#e0e0e0" stroke="#333" stroke-width="2" rx="5"/>
  <text x="450" y="220" class="text-normal" text-anchor="middle" font-weight="bold">Fritzbox + nftables</text>

  <!-- Arrow down -->
  <line x1="450" y1="240" x2="450" y2="270" class="arrow"/>

  <!-- DMZ Zone (Pi5) -->
  <rect x="50" y="270" width="800" height="120" class="zone-dmz" rx="10"/>
  <text x="450" y="300" class="text-title" text-anchor="middle">DMZ/Proxy Zone (Pi5 - rpi5)</text>
  <text x="450" y="325" class="text-normal" text-anchor="middle">Traefik Reverse Proxy - SSL-Terminierung</text>
  <text x="100" y="350" class="text-small">✅ Port 443: HTTPS (öffentlich)</text>
  <text x="100" y="370" class="text-small">❌ Port 80: HTTP (gesperrt)</text>
  <text x="500" y="350" class="text-small">✅ Ionos-Zertifikat</text>
  <text x="500" y="370" class="text-small">✅ Default DROP Policy</text>

  <!-- Arrow down -->
  <line x1="450" y1="390" x2="450" y2="420" class="arrow"/>
  <text x="480" y="410" class="text-small" font-weight="bold">HTTP intern</text>

  <!-- Internal Zone (Pi4) -->
  <rect x="50" y="420" width="800" height="120" class="zone-internal" rx="10"/>
  <text x="450" y="450" class="text-title" text-anchor="middle">Interne Zone (Pi4 - rpi4b)</text>
  <text x="450" y="475" class="text-normal" text-anchor="middle">Docker Services - Nicht öffentlich erreichbar</text>
  <text x="100" y="500" class="text-small">• Home Assistant (8123)</text>
  <text x="100" y="520" class="text-small">• Nextcloud (8088)</text>
  <text x="350" y="500" class="text-small">• Pigallery2 (8001)</text>
  <text x="350" y="520" class="text-small">• Datenbanken (intern)</text>
  <text x="600" y="500" class="text-small">• MQTT, Redis</text>
  <text x="600" y="520" class="text-small">• Nur via Traefik</text>

  <!-- Local Network Zone -->
  <rect x="50" y="560" width="380" height="30" class="zone-local" rx="5"/>
  <text x="240" y="580" class="text-normal" text-anchor="middle">Lokales Netzwerk (192.168.178.0/24)</text>

  <!-- SSH Access Arrow -->
  <line x1="240" y1="560" x2="240" y2="390" class="arrow" stroke-dasharray="5,5"/>
  <text x="150" y="475" class="text-small" fill="#1565c0" font-weight="bold">SSH (Port 22)</text>
  <text x="150" y="490" class="text-small" fill="#1565c0">nur lokal</text>

  <!-- Legend -->
  <rect x="470" y="560" width="380" height="30" fill="#f5f5f5" stroke="#333" stroke-width="1" rx="5"/>
  <text x="490" y="580" class="text-small" font-weight="bold">Sicherheitsprinzip: Default DROP</text>
  <text x="700" y="580" class="text-small">Nur explizit erlaubte Verbindungen</text>
</svg>

<!-- Made with Bob -->
