<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 900" width="800" height="900">
  <defs>
    <style>
      .box { fill: #f0f0f0; stroke: #333; stroke-width: 2; }
      .header { fill: #4a90e2; stroke: #333; stroke-width: 2; }
      .service { fill: #e8f4f8; stroke: #4a90e2; stroke-width: 1.5; }
      .firewall { fill: #ffebee; stroke: #d32f2f; stroke-width: 2; }
      .text { font-family: Arial, sans-serif; font-size: 14px; fill: #333; }
      .text-white { font-family: Arial, sans-serif; font-size: 14px; fill: white; font-weight: bold; }
      .text-small { font-family: Arial, sans-serif; font-size: 12px; fill: #555; }
      .text-tiny { font-family: Arial, sans-serif; font-size: 11px; fill: #666; }
      .arrow { stroke: #333; stroke-width: 2; fill: none; marker-end: url(#arrowhead); }
      .arrow-label { font-family: Arial, sans-serif; font-size: 12px; fill: #d32f2f; font-weight: bold; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>

  <!-- Internet -->
  <rect x="50" y="20" width="700" height="60" class="header" rx="5"/>
  <text x="400" y="55" class="text-white" text-anchor="middle">Internet</text>

  <!-- Arrow Internet to Fritzbox -->
  <line x1="400" y1="80" x2="400" y2="120" class="arrow"/>

  <!-- Fritzbox -->
  <rect x="250" y="120" width="300" height="80" class="box" rx="5"/>
  <text x="400" y="145" class="text" text-anchor="middle" font-weight="bold">Fritzbox (Router)</text>
  <text x="400" y="165" class="text-small" text-anchor="middle">192.168.178.1</text>
  <text x="400" y="185" class="text-small" text-anchor="middle" font-weight="bold">Port Forward: 443 → Pi5</text>

  <!-- Arrow Fritzbox to Pi5 -->
  <line x1="400" y1="200" x2="400" y2="240" class="arrow"/>
  <text x="420" y="225" class="arrow-label">Port 443</text>

  <!-- Pi5 Container -->
  <rect x="50" y="240" width="700" height="280" class="box" rx="5"/>
  <rect x="50" y="240" width="700" height="35" class="header" rx="5"/>
  <text x="400" y="263" class="text-white" text-anchor="middle">Pi5 (rpi5) - Traefik Server</text>
  <text x="70" y="295" class="text-small">IP: 192.168.178.55 (WLAN) / 192.168.178.5 (LAN)</text>

  <!-- Firewall Box in Pi5 -->
  <rect x="80" y="310" width="640" height="90" class="firewall" rx="5"/>
  <text x="400" y="330" class="text" text-anchor="middle" font-weight="bold">nftables Firewall (Default DROP)</text>
  <text x="100" y="355" class="text-tiny">✅ Port 443: HTTPS (öffentlich)</text>
  <text x="100" y="375" class="text-tiny">✅ Port 22: SSH (nur lokal 192.168.178.0/24)</text>
  <text x="100" y="395" class="text-tiny">❌ Port 80: HTTP (GESPERRT)</text>
  <text x="450" y="355" class="text-tiny">✅ Port 8080: Traefik Dashboard (lokal)</text>
  <text x="450" y="375" class="text-tiny">✅ Docker-Netzwerke erlaubt</text>
  <text x="450" y="395" class="text-tiny">✅ Fail2Ban aktiv</text>

  <!-- Traefik Box in Pi5 -->
  <rect x="80" y="420" width="640" height="80" class="service" rx="5"/>
  <text x="400" y="445" class="text" text-anchor="middle" font-weight="bold">Traefik Reverse Proxy</text>
  <text x="100" y="465" class="text-tiny">• SSL-Terminierung (Ionos Zertifikat)</text>
  <text x="100" y="485" class="text-tiny">• Routing zu Backend-Services (Pi4)</text>
  <text x="450" y="465" class="text-tiny">• Docker Network: traefik (172.30.0.0/24)</text>
  <text x="450" y="485" class="text-tiny">• Kein Let's Encrypt (Port 80 gesperrt)</text>

  <!-- Arrow Pi5 to Pi4 -->
  <line x1="400" y1="520" x2="400" y2="560" class="arrow"/>
  <text x="420" y="545" class="arrow-label">HTTP intern</text>

  <!-- Pi4 Container -->
  <rect x="50" y="560" width="700" height="320" class="box" rx="5"/>
  <rect x="50" y="560" width="700" height="35" class="header" rx="5"/>
  <text x="400" y="583" class="text-white" text-anchor="middle">Pi4 (rpi4b) - Application Server</text>
  <text x="70" y="615" class="text-small">IP: 192.168.178.3 (LAN) / 192.168.178.33 (WLAN)</text>

  <!-- nginx Box in Pi4 -->
  <rect x="80" y="630" width="640" height="60" class="service" rx="5"/>
  <text x="400" y="655" class="text" text-anchor="middle" font-weight="bold">nginx Reverse Proxy (Übergangsphase)</text>
  <text x="100" y="675" class="text-tiny">Port 443 (lokal) - hajo62.duckdns.org</text>

  <!-- Docker Services Box in Pi4 -->
  <rect x="80" y="710" width="640" height="150" class="service" rx="5"/>
  <text x="400" y="735" class="text" text-anchor="middle" font-weight="bold">Docker Services</text>
  
  <!-- Services in 2 columns -->
  <text x="100" y="760" class="text-tiny">• Home Assistant (Port 8123)</text>
  <text x="100" y="780" class="text-tiny">• Nextcloud (Port 8088)</text>
  <text x="100" y="800" class="text-tiny">• Pigallery2 (Port 8001)</text>
  <text x="100" y="820" class="text-tiny">• Mosquitto MQTT (Port 1883)</text>
  <text x="100" y="840" class="text-tiny">• Z-Wave JS (Port 3000, 8091)</text>
  
  <text x="450" y="760" class="text-tiny">• MariaDB HA (Port 3306)</text>
  <text x="450" y="780" class="text-tiny">• MariaDB Nextcloud (Port 3307)</text>
  <text x="450" y="800" class="text-tiny">• MariaDB Pigallery2 (Port 3310)</text>
  <text x="450" y="820" class="text-tiny">• Redis Cache (Port 6379)</text>
  <text x="450" y="840" class="text-tiny">• Docker Network: proxy (172.20.0.0/16)</text>

  <!-- Network Info -->
  <text x="400" y="895" class="text" text-anchor="middle" font-style="italic">Lokales Netzwerk: 192.168.178.0/24</text>
</svg>

<!-- Made with Bob -->
