services:
  geoblock-monitor:
    build:
      context: ./geo-monitor
    container_name: geoblock-monitor
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    environment:
      - LOG_FILE=/logs/access.json
      - BLOCK_STATUS=403,451
      - FULL_SCAN=1
      - SHOW_IPS=true
      - COUNT_BLOCKS_WITHOUT_GEO=true
      - GEO_URLS=https://ipwho.is/{ip},http://ip-api.com/json/{ip}?fields=status,countryCode,lat,lon,message,https://ipinfo.io/{ip}/json,https://get.geojs.io/v1/ip/geo/{ip}.json
      - GEO_TIMEOUT=3
      - GEO_USER_AGENT=Mozilla/5.0 (geoblock-monitor-live-v15)
      - BOUNCER_CONTAINER=traefik-bouncer
      - DOCKER_API_VERSION=1.44
    volumes:
      - ../logs:/logs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8090:8090"
