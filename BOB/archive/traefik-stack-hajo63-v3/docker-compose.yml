version: "3.9"

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped

    # Ressourcen-Limits
    cpus: "0.75"
    mem_limit: "512m"
    pids_limit: 256

    environment:
      - DOCKER_API_VERSION=1.44
      - TZ=Europe/Berlin
      # ─────────────────────────────────────
      # NEU: CrowdSec Plugin API-Key
      # ─────────────────────────────────────
      - CROWDSEC_TRAEFIK_BOUNCER_API_KEY=${CROWDSEC_TRAEFIK_BOUNCER_API_KEY}

    security_opt:
      - no-new-privileges:true

    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./data/dynamic_conf.yml:/etc/traefik/dynamic_conf.yml:ro
      - ./data/certs:/certs:ro
      - ./logs:/var/log/traefik

    networks:
      - traefik_proxy

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: crowdsec
    restart: unless-stopped

    # Ressourcen-Limits
    cpus: "0.50"
    mem_limit: "384m"
    pids_limit: 256

    environment:
      - COLLECTIONS=crowdsecurity/traefik crowdsecurity/http-cve crowdsecurity/http-dos
      - TZ=Europe/Berlin
      - DISABLE_ONLINE_API=true

    volumes:
      - ./logs:/var/log/traefik:ro
      - ./crowdsec/acquis.yaml:/etc/crowdsec/acquis.yaml:ro
      - crowdsec-data:/var/lib/crowdsec/data
      - crowdsec-config:/etc/crowdsec

    networks:
      - traefik_proxy

# ─────────────────────────────────────────────
# traefik-bouncer CONTAINER ENTFERNT ❌
# (Plugin übernimmt diese Rolle)
# ─────────────────────────────────────────────

networks:
  traefik_proxy:
    name: traefik_proxy

volumes:
  crowdsec-data:
  crowdsec-config:
