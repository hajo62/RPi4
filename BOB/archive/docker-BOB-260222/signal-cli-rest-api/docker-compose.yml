services:
  signal-cli-rest-api:
    image: bbernhard/signal-cli-rest-api:latest
    container_name: signal-cli-rest-api
    
    # DNS: Cloudflare + Google für Signal-Server Auflösung
    dns:
      - 1.1.1.1      # Cloudflare (schnell, datenschutzfreundlich)
      - 8.8.8.8      # Google (Fallback)
    
    # Port: Geändert von 8080 auf 8090 (Konflikt vermeiden)
    ports:
      - "8090:8080"
    
    # Netzwerk: proxy statt homeassistant_internal (braucht Internet!)
    networks:
      - proxy
    
    volumes:
      - /home/hajo/docker/signal-cli-rest-api:/home/.local/share/signal-cli
      - /etc/localtime:/etc/localtime:ro  # Zeitzone
      - /etc/timezone:/etc/timezone:ro    # Zeitzone Name
    
    environment:
      - MODE=normal
      - AUTO_RECEIVE_SCHEDULE=2 18 * * *
      # - TZ=Europe/Berlin
      - TZ=${TZ:-Europe/Berlin}
    
    # Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    
    # Health-Check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    restart: unless-stopped
    
    labels:
      - "com.docker.compose.project=signal-cli"
      - "description=Signal Messenger CLI REST API for Home Assistant"

# Netzwerk-Definition für lokales Testen
networks:
  proxy:
    external: true  # Nutzt externes Netzwerk (muss vorher existieren)

