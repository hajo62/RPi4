load_module modules/ngx_http_geoip_module.so;

# Vollständige nginx.conf für Pi #4 (192.168.178.3)
# ANGEPASST FÜR: docker-compose-Pi4-NEW.yaml
# 
# WICHTIG: Verwendet variables für upstreams, damit nginx startet auch wenn Container noch nicht laufen
# 
# Setup: Traefik (Pi #5: 192.168.178.55) → nginx → Home Assistant / Nextcloud
# - Traefik terminiert TLS und leitet intern per HTTP mit korrekt gesetztem Host-Header auf diese nginx-Instanz.
# - Zusätzlich bleiben die bisherigen duckdns-SSL-Server (Port 443) aktiv.

worker_processes 1;

events { worker_connections 1024; }

http {
  # Rate-Limit Zone (z.B. für Signal API)
  limit_req_zone  $binary_remote_addr  zone=signal:10m   rate=1r/m;

  sendfile on;

  # Gzip
  gzip              on;
  gzip_http_version 1.0;
  gzip_proxied      any;
  gzip_min_length   500;
  gzip_disable      "MSIE [1-6]\\.";
  gzip_types        text/plain text/xml text/css
                    text/comma-separated-values
                    text/javascript
                    application/x-javascript
                    application/atom+xml;

  # ----- Globale SSL-Parameter (für duckdns-SSL-Server auf 443) -----
  ssl_certificate         /etc/letsencrypt/hajo62.duckdns.org/fullchain.cer;
  ssl_certificate_key     /etc/letsencrypt/hajo62.duckdns.org/hajo62.duckdns.org.key;
  ssl_trusted_certificate /etc/letsencrypt/hajo62.duckdns.org/ca.cer;

  # Diffie-Hellman-Parameter
  ssl_dhparam dhparam.pem;

  # TLS-Protokolle & Cipher
  ssl_protocols TLSv1.2  TLSv1.3;

  # TLS 1.2 Cipher (eine Zeile!)
  ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';

  # Für TLS 1.3: eigene Ciphersuites (OpenSSL >=1.1.1)
  ssl_conf_command Ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256:TLS_CHACHA20_POLY1305_SHA256;


  # Empfehlung mit TLS 1.3: nicht auf Server-Ciphers bestehen
  ssl_prefer_server_ciphers off;
  
  # Optional (Performance):
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # OCSP Stapling
  ssl_stapling on;
  ssl_stapling_verify on;

  # HSTS
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Sicherheits-Header
  add_header X-Frame-Options SAMEORIGIN;
  add_header X-XSS-Protection "1; mode=block";

  # Echte Client-IP aus Traefik übernehmen (wirkt nur für Requests von 192.168.178.55)
  real_ip_header X-Forwarded-For;
  set_real_ip_from 192.168.178.55;

  # WebSocket Upgrade Map
  map $http_upgrade $connection_upgrade {
      default upgrade;
      ''      close;
  }

  # ============================================================
  # RESOLVER für Docker DNS
  # ============================================================
  # Docker's interner DNS-Server
  resolver 127.0.0.11 valid=30s;

  ######################################################################
  # ---- Bestehende duckdns-SSL-Server (Port 443) bleiben aktiv ----
  ######################################################################

  # Home Assistant über duckdns-SSL
  server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ha.hajo62.duckdns.org;

    location / {
      # Variable verwenden, damit nginx startet auch wenn Container nicht läuft
      set $homeassistant homeassistant:8123;
      proxy_pass http://$homeassistant;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }
  }

  # Nextcloud über duckdns-SSL
  server {
    listen      443 ssl; # IPv4, SSL/TLS, HTTP/2
    listen [::]:443 ssl; # IPv6, SSL/TLS, HTTP/2
    http2 on;
    server_name nc.hajo62.duckdns.org;

    # set max upload size and increase upload timeout:
    client_max_body_size 512M;
    client_body_timeout 300s;
    fastcgi_buffers 64 4K;

    # Enable gzip but do not remove ETag headers
    gzip on;
    gzip_vary on;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_proxied expired no-cache no-store private no_last_modified no_etag auth;
    gzip_types application/atom+xml application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/vnd.ms-fontobject application/x-font-ttf application/x-web-app-manifest+json application/xhtml+xml application/xml font/opentype image/bmp image/svg+xml image/x-icon text/cache-manifest text/css text/plain text/vcard text/vnd.rim.location.xloc text/vtt text/x-component text/x-cross-domain-policy;

    # HTTP response headers borrowed from Nextcloud `.htaccess`
    add_header Referrer-Policy                      "no-referrer"   always;
    add_header X-Content-Type-Options               "nosniff"       always;
    add_header X-Download-Options                   "noopen"        always;
    add_header X-Frame-Options                      "SAMEORIGIN"    always;
    add_header X-Permitted-Cross-Domain-Policies    "none"          always;
    add_header X-Robots-Tag                         "none"          always;
    add_header X-XSS-Protection                     "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Remove X-Powered-By, which is an information leak
    fastcgi_hide_header X-Powered-By;

    # Path to the root of your installation (bei Proxy eigentlich nicht nötig)
    root /var/www/nextcloud;

    index index.php index.html /index.php$request_uri;

    location = /robots.txt {
        allow all;
        log_not_found off;
        access_log off;
    }

    location ^~ /.well-known {
        location = /.well-known/carddav { return 301 /remote.php/dav/; }
        location = /.well-known/caldav  { return 301 /remote.php/dav/; }
        location /.well-known/acme-challenge    { try_files $uri $uri/ =404; }
        location /.well-known/pki-validation    { try_files $uri $uri/ =404; }
        return 301 /index.php$request_uri;
    }

    # Limit download size
    proxy_max_temp_file_size 4096m;

    # Proxy for nextcloud docker
    location / {
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "same-origin";
        proxy_cookie_path / "/; secure; HttpOnly";

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Variable verwenden
        set $nextcloud nextcloud:80;
        proxy_pass http://$nextcloud;
    }
  }

  # PiGallery2 über duckdns-SSL
  server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name pg.hajo62.duckdns.org;

    gzip on;

    location / {
      # Variable verwenden
      set $pigallery2 pigallery2:80;
      proxy_pass http://$pigallery2;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }

  # PiGallery2 über hajo63.de (HTTP, für Traefik-Vorbereitung)
  server {
    listen 80;
    server_name pg.hajo63.de;

    location / {
        # Variable verwenden
        set $pigallery2 pigallery2:80;
        proxy_pass         http://$pigallery2;
        proxy_http_version 1.1;
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
  }

  # Signal Rest API über duckdns-SSL
  server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name signal.hajo62.duckdns.org;

    location / {
      proxy_pass http://192.168.178.3:8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;

      limit_req zone=signal;
    }
  }

  # DigiKam über duckdns-SSL
  server {
    listen      443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name digikam.hajo62.duckdns.org;

    gzip on;

    location / {
      auth_basic "Restricted";
      auth_basic_user_file /etc/nginx/passwords;

      proxy_pass http://192.168.178.3:4000;
      proxy_redirect off;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }

  ######################################################################
  # ---- Neue Hosts über Traefik (HTTP only, Port 80) ----
  ######################################################################

  # Home Assistant via Traefik → nginx (Host: ha.hajo63.de)
  server {
      listen 80;
      server_name ha.hajo63.de;

      location / {
          # Variable verwenden
          set $homeassistant homeassistant:8123;
          proxy_pass         http://$homeassistant;
          proxy_http_version 1.1;

          proxy_set_header   Host               $host;
          proxy_set_header   X-Real-IP          $remote_addr;
          proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto  $scheme;

          proxy_set_header   Upgrade            $http_upgrade;
          proxy_set_header   Connection         $connection_upgrade;

          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
      }
  }

  # Nextcloud via Traefik → nginx (Host: nc.hajo63.de)
  server {
      listen 80;
      server_name nc.hajo63.de;

      client_max_body_size 2048M;
      add_header X-Content-Type-Options nosniff;
      add_header X-Frame-Options "SAMEORIGIN";
      add_header X-XSS-Protection "1; mode=block";

      location = /robots.txt {
          allow all;
          log_not_found off;
          access_log off;
      }

      location / {
          # Variable verwenden
          set $nextcloud nextcloud:80;
          proxy_pass         http://$nextcloud;
          proxy_http_version 1.1;

          proxy_set_header   Host               $host;
          proxy_set_header   X-Real-IP          $remote_addr;
          proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Proto  $scheme;

          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
          proxy_request_buffering off;
      }
  }
}

