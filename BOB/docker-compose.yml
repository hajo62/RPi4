# ============================================
# Zentrale Docker Compose Orchestrierung
# ============================================
#
# Diese Datei bindet alle modularen Services ein und
# definiert gemeinsame Netzwerke.
#
# Verwendung:
#   docker compose up -d              # Alle Services starten
#   docker compose down               # Alle Services stoppen
#   docker compose ps                 # Status aller Services
#
# Einzelne Services testen:
#   cd docker/signal-cli-rest-api
#   docker compose up -d              # Funktioniert weiterhin!
#
# ============================================

# ============================================
# Globale Netzwerk-Definitionen
# ============================================
# WICHTIG: Netzwerke MÜSSEN vor include definiert werden!
# Diese Netzwerke werden von allen Services genutzt

networks:
  # Proxy-Netzwerk: Für Services mit Internet-Zugriff
  # Wird später von Traefik genutzt
  proxy:
    name: proxy
    driver: bridge

# ============================================
# Services einbinden
# ============================================

include:
  - docker/crowdsec/docker-compose.yml
  - docker/ionos-dyndns/docker-compose.yml
  - docker/signal-cli-rest-api/docker-compose.yml
  - docker/whats-up-docker/docker-compose.yml

