log:
  level: INFO

accessLog:
  filePath: "/var/log/traefik/access.json"
  format: json
  bufferingSize: 100
  filters:
    statusCodes:
      - "200-399"
      - "401"
      - "403"
      - "404"
      - "429"
      - "500-599"
  fields:
    defaultMode: keep
    names:
      ClientHost: keep
    headers:
      defaultMode: drop
      names:
        Referer: keep
        Origin: drop

api:
  dashboard: true
  insecure: true

# ─────────────────────────────────────────────
# NEU: CrowdSec + bestehendes Geoblock Plugin
# ─────────────────────────────────────────────
experimental:
  plugins:
    geoblock:
      moduleName: github.com/PascalMinder/geoblock
      version: v0.3.3
    crowdsec-bouncer:              # ← NEU
      moduleName: github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin
      version: v1.5.0

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    watch: true

  file:
    filename: /etc/traefik/dynamic_conf.yml
    watch: true
