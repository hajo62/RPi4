# ============================================
# Traefik Dynamic Configuration - Middlewares
# ============================================

http:
  middlewares:
    # ============================================
    # GeoIP-Blocking (nur Deutschland)
    # ============================================
    geoblock-de:
      plugin:
        geoblock:
          blackListMode: false
          allowLocalRequests: true
          allowUnknownCountries: true
          api: "https://get.geojs.io/v1/ip/country/{ip}"
          apiTimeoutMs: 1500
          cacheSize: 50
          forceMonthlyUpdate: true
          countries:
            - DE
    
    # ============================================
    # Security Headers (Pragmatisch & Funktional)
    # ============================================
    # CSP ist bewusst permissiv konfiguriert, damit moderne Web-Apps
    # (Home Assistant, Nextcloud, etc.) funktionieren.
    # default-src 'none' + explizite Direktiven = Best Practice
    secure-headers:
      headers:
        stsSeconds: 63072000
        stsIncludeSubdomains: true
        stsPreload: true
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        contentSecurityPolicy: "default-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; media-src 'self'; worker-src 'self'; child-src 'self'; object-src 'none'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; manifest-src 'self'"
        permissionsPolicy: "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    
    # Redirect zu HTTPS
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
    
    # ============================================
    # Rate Limiting
    # ============================================
    rate-limit-standard:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # Hinweis: dashboard-auth ist in middlewares.auth.yml definiert
    # (nicht in Git – enthält htpasswd-Hash)

