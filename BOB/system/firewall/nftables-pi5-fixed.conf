#!/usr/sbin/nft -f
# Produktiv-Firewall für Pi5 (rpi5) - RaspberryOS Trixie
# Hostname: rpi5
# IP: 192.168.178.55
# Rolle: Traefik Reverse Proxy + signal-cli-rest-api
# Zertifikate: Ionos (kein Let's Encrypt)
# Strategie: Default DROP
# Erstellt: 2026-02-21
# FIXED: Docker verwaltet NAT selbst (iptables: true)

flush ruleset

# ============================================
# Filter-Tabelle (Firewall-Regeln)
# ============================================
table inet filter {
    # Lokales Netzwerk
    set local_network {
        type ipv4_addr
        flags interval
        elements = { 192.168.178.0/24 }
    }
    
    # Pi4 Backend-Server (für Traefik-Zugriff)
    # Pi4: 192.168.178.3 (LAN) / 192.168.178.33 (WLAN) - Aktuell: LAN
    set backend_servers {
        type ipv4_addr
        elements = { 192.168.178.3, 192.168.178.33 }
    }
    
    # Öffentliche Ports (nur HTTPS!)
    set public_ports {
        type inet_service
        elements = { 443 }
    }
    
    # Lokale Management-Ports (nur aus lokalem Netzwerk erreichbar)
    set local_management_ports {
        type inet_service
        elements = {
            3000,   # WUD (What's Up Docker) Web UI
            8080,   # CrowdSec LAPI
            8090,   # signal-cli-rest-api
            8091,   # WUD Webhook
            8092,   # Traefik Dashboard
            8095,   # Attack Dashboard
            8180,   # This Week in Past
            8280    # This Week in Past (Privat)
        }
    }

    # ============================================
    # INPUT Chain (eingehender Traffic)
    # ============================================
    chain input {
        type filter hook input priority filter; policy drop;
        
        # Loopback (localhost)
        iif lo accept
        
        # Bestehende Verbindungen
        ct state established,related accept
        
        # Ungültige Pakete ablehnen
        ct state invalid drop
        
        # SSH mit Rate Limiting (nur lokales Netzwerk)
        ip saddr @local_network tcp dport 22 ct state new limit rate 3/minute accept
        
        # HTTPS öffentlich (Traefik mit Ionos-Zertifikat)
        tcp dport @public_ports accept
        
        # Port 80 explizit blockieren (kein Let's Encrypt benötigt)
        tcp dport 80 drop
        
        # Management-Ports nur von lokalem Netzwerk
        ip saddr @local_network tcp dport @local_management_ports accept
        
        # Docker-Netzwerke (Container können Host erreichen)
        iifname "docker0" accept
        iifname "br-*" accept
        
        # ICMP (Ping)
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
        
        # Optional: Logging für abgelehnte Pakete (auskommentiert)
        # log prefix "Pi5-FW-DROP: " drop
    }

    # ============================================
    # FORWARD Chain (weitergeleiteter Traffic)
    # ============================================
    chain forward {
        type filter hook forward priority filter; policy drop;
        
        # Docker-Container-Kommunikation
        ct state established,related accept
        
        # Docker Bridge-Netzwerke (Container untereinander)
        iifname "docker0" accept
        oifname "docker0" accept
        iifname "br-*" accept
        oifname "br-*" accept
        
        # Traefik zu Backend-Servern (Pi4)
        ip daddr @backend_servers accept
    }

    # ============================================
    # OUTPUT Chain (ausgehender Traffic)
    # ============================================
    chain output {
        type filter hook output priority filter; policy accept;
    }
}

