# ============================================
# NETZWERK-KONFIGURATION
# ============================================
networks:
  # Proxy-Netzwerk für nginx (aktuell) und Traefik (zukünftig)
  proxy:
    name: proxy
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
  
  # Internes Netzwerk für Home Assistant und zugehörige Services
  homeassistant_internal:
    name: homeassistant_internal
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
  
  # Internes Netzwerk für Nextcloud (DB + Redis)
  nextcloud_internal:
    name: nextcloud_internal
    driver: bridge
    internal: true  # Kein Internet-Zugriff für DB
    ipam:
      config:
        - subnet: 172.22.0.0/16

