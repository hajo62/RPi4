# version: '3.9'
# Für Banner: https://helloacm.com/banner
# 
# ÜBERGANGSPHASE: nginx (hajo62.duckdns.org) + Traefik-Vorbereitung (hajo63.de)
# 
# Ports: 
#   443 nginx (hajo62.duckdns.org)
#  1883 Mosquitto
#  3000 Z-Wave JS Server
#  3306 Homeassistant MariaDB
#  3307 Nextcloud MariaDB
#  3310 Pigallery2 MariaDB
#  3311 PhotoPrism MariaDB
#  3312 Pigallery3 MariaDB
#  6379 redis
#  8001 Pigallery2
#  8002 Pigallery3
#  8082 zigbee2mqtt web frontend
#  8088 Nextcloud
#  8091 Z-Wave JS Server -  WebUI
#  8123 Home Assistant
#  9001 Mosquitto

services:

  ##################################################
  # Homeassistant
  ##################################################
  homeassistant:
    privileged: true
#    image: ghcr.io/home-assistant/home-assistant:stable
    image: ghcr.io/home-assistant/home-assistant:v2026.02.3
    container_name: homeassistant
    depends_on:
      homeassistant-db:
        condition: service_healthy
    deploy:
        resources:
            limits:
              memory: 2048M
    volumes:
      - /home/hajo/docker-volumes/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/dbus:/run/dbus:ro
      - /home/hajo/docker-volumes/LetsEncrypt/certs/hajo62.duckdns.org/:/etc/letsencrypt/
      - /home/hajo/docker-volumes/nextcloud/data:/nextcloud:ro
    devices:
      - /dev/ttyUSB0:/dev/ttyUSB0
    # WICHTIG: Für Traefik-Vorbereitung network_mode: host entfernt!
    # Stattdessen explizite Netzwerke und Ports
    networks:
      - proxy              # Für zukünftigen Traefik-Zugriff
      - homeassistant_internal
    ports:
      - "8123:8123"        # Für nginx und lokalen Zugriff
    restart: unless-stopped
    security_opt:
      - "apparmor=docker-default"
    labels:
      # Traefik Labels für zukünftige Nutzung (hajo63.de)
      - "traefik.enable=true"
      - "traefik.http.routers.homeassistant.rule=Host(`ha.hajo63.de`)"
      - "traefik.http.routers.homeassistant.entrypoints=websecure"
      - "traefik.http.routers.homeassistant.tls=true"
      - "traefik.http.routers.homeassistant.tls.certresolver=letsencrypt"
      - "traefik.http.services.homeassistant.loadbalancer.server.port=8123"
      - "traefik.docker.network=proxy"
      # Middleware für Home Assistant
      - "traefik.http.routers.homeassistant.middlewares=homeassistant-headers"
      - "traefik.http.middlewares.homeassistant-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.homeassistant-headers.headers.customrequestheaders.X-Forwarded-For="

  ##################################################
  # Homeassistant - Datenbank
  ##################################################
  homeassistant-db:
    image: mariadb
    container_name: homeassistant-db
    restart: unless-stopped
    networks:
      - homeassistant_internal  # Nur intern, kein Proxy-Zugriff
    volumes:
      - /home/hajo/docker-volumes/homeassistant-mariadb:/var/lib/mysql
    environment:
      TZ: Europe/Berlin
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - 3306:3306
    logging:
      driver: "json-file"
      options:
        max-file: 5
        max-size: 15m
    healthcheck:
      test:  mysqladmin ping -h 127.0.0.1 -u root --password=$MYSQL_ROOT_PASSWORD || exit 1
      interval: 30s
      timeout: 5s
      retries: 5

  ##################################################
  # zigbee2mqtt
  ##################################################
  # WICHTIG: Braucht network_mode: host für USB-Gerätezugriff
  # Verwendet stabilen by-id Link statt ttyUSB0
  zigbee2mqtt:
    container_name: zigbee2mqtt
    image: koenkk/zigbee2mqtt
    deploy:
        resources:
            limits:
              cpus: '1.0'
              memory: 256M
    depends_on:
      - mqtt
    volumes:
      - /home/hajo/docker-volumes/zigbee2mqtt/data:/app/data
      - /run/udev:/run/udev:ro
    ports:
      - 8082:8080
    devices:
      - /dev/serial/by-id/usb-ITead_Sonoff_Zigbee_3.0_USB_Dongle_Plus_8ec00336acc9eb1186858b4f1d69213e-if00-port0:/dev/ttyUSB0
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Europe/Berlin
    healthcheck:
      test:  HEALTHCHECK CMD curl --fail http://localhost:8082/ || exit 1
      interval: 30s
      timeout: 5s
      retries: 5

  ##################################################
  # nginx - ÜBERGANGSPHASE für hajo62.duckdns.org
  ##################################################
  nginx: 
    image: nginx:stable
    container_name: nginx
    deploy:
      resources:
          limits:
            cpus: '1.0'
            memory: 128M
    volumes:
      - ./docker-volumes/nginx/log:/var/log/nginx
      - ./docker-volumes/nginx/etc/nginx.conf:/etc/nginx/nginx.conf
      - ./docker-volumes/nginx/etc/nginx/cache:/etc/nginx/cache
      - ./docker-volumes/nginx/etc/passwords:/etc/nginx/passwords
      - /home/hajo/docker-volumes/LetsEncrypt/certs/:/etc/letsencrypt/
      - /home/hajo/docker-volumes/LetsEncrypt/certs/dhparam.pem:/etc/nginx/dhparam.pem
      - /home/hajo/docker-volumes/geoip-upd/geoip2:/usr/share/Geoip:ro
    networks:
      - proxy  # Zugriff auf alle Services im proxy-Netzwerk
    ports:
      - 80:80     # HTTP (für Let's Encrypt Challenge und Redirects)
      - 443:443   # HTTPS (hajo62.duckdns.org)
    restart: unless-stopped
    labels:
      - "traefik.enable=false"  # nginx nicht über Traefik erreichbar

  ##################################################
  # Nextcloud
  ##################################################
  nextcloud:
    image: nextcloud:stable
    container_name: nextcloud
    restart: unless-stopped
    hostname: nc.hajo62.duckdns.org
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    deploy:
        resources:
            limits:
              cpus: '2.0'
              memory: 4G
    networks:
      - proxy              # Für nginx und zukünftigen Traefik
      - nextcloud_internal # Für DB und Redis
    dns:
      - 127.0.0.1
      - 1.1.1.1
    ports:
      - 8088:80
    volumes:
      - /home/hajo/docker-volumes/nextcloud:/var/www/html
      - /home/hajo/Photos:/mnt/Photos
    labels:
      # Traefik Labels für zukünftige Nutzung (hajo63.de)
      - "traefik.enable=true"
      - "traefik.http.routers.nextcloud.rule=Host(`nc.hajo63.de`)"
      - "traefik.http.routers.nextcloud.entrypoints=websecure"
      - "traefik.http.routers.nextcloud.tls=true"
      - "traefik.http.routers.nextcloud.tls.certresolver=letsencrypt"
      - "traefik.http.services.nextcloud.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"
      # Nextcloud-spezifische Middleware
      - "traefik.http.routers.nextcloud.middlewares=nextcloud-headers,nextcloud-redirect"
      - "traefik.http.middlewares.nextcloud-headers.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.nextcloud-headers.headers.stsSeconds=15552000"
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.regex=https://(.*)/.well-known/(card|cal)dav"
      - "traefik.http.middlewares.nextcloud-redirect.redirectregex.replacement=https://$$1/remote.php/dav/"

  ##################################################
  # Nextcloud - Datenbank
  ##################################################
  nextcloud-db:
    image: mariadb
    container_name: nextcloud-db
    restart: unless-stopped
    deploy:
        resources:
            limits:
              cpus: '2.0'
              memory: 4G    
    volumes:
      - /home/hajo/docker-volumes/nextcloud-mariadb:/var/lib/mysql
    hostname: nextcloud-db
    networks:
      - nextcloud_internal  # Nur intern, kein Proxy-Zugriff
    environment:
      TZ: Europe/Berlin
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: "${MYSQL_NCUSER}"
      MYSQL_PASSWORD: "${MYSQL_NCPASSWORD}"
      MYSQL_DATABASE: "${MYSQL_NCDATABASE}"
    command: --transaction-isolation=READ-COMMITTED --log-bin=ROW --innodb-read-only-compressed=OFF --log_bin_trust_function_creators=1
    ports:
      - 3307:3306      
    healthcheck:
      test:  mysqladmin ping -h 127.0.0.1 -u ${MYSQL_NCUSER} --password=${MYSQL_NCPASSWORD} || exit 1
      interval: 30s
      timeout: 5s
      retries: 5 

  ##################################################
  # Nextcloud - Cache
  ##################################################
  nextcloud-redis:
      image: redis:alpine
      container_name: nextcloud-redis      
      restart: unless-stopped
      networks:
        - nextcloud_internal
      deploy:
        resources:
          limits:
            cpus: '1.0'
            memory: 0.5G

  ##################################################
  # Mosquitto
  ##################################################
  mqtt:
    image: eclipse-mosquitto
    container_name: mosquitto
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 125M
    networks:
      - homeassistant_internal
    volumes:
      - /home/hajo/docker-volumes/mosquitto:/mosquitto
    ports:
      - 1883:1883
      - 9001:9001

  ##################################################
  # Homee2mqtt
  ##################################################
  # WICHTIG: Braucht network_mode: host für Homee-Zugriff im lokalen Netzwerk
  homee2mqtt:
    container_name: homee2mqtt
    image: hajo/homee2mqtt:10-0.0.4
    depends_on:
      - mqtt
    volumes:
      - /home/hajo/docker-volumes/homee2mqtt/config.json:/etc/homeeToMqtt/config.json
      - /home/hajo/docker-volumes/homee2mqtt/log:/usr/src/app/log
    network_mode: host
    dns:
      - 1.1.1.1
      - 8.8.8.8
    restart: unless-stopped

  ####################################################################################################
  # PiGallery2
  ####################################################################################################
  pigallery2:
    image: bpatrik/pigallery2:v2.0.0
    command: sh -c 'bin/wait-for 192.168.178.3:${MYSQL_PGDATABASEPort} -- --Server-Database-mysql-host=192.168.178.3 --Server-Database-mysql-username=${MYSQL_PGUSER} --Server-Database-mysql-password="${MYSQL_PGPASSWORD}" --Server-Database-mysql-database="${MYSQL_PGDATABASE}"'
    container_name: pigallery2
    depends_on:
      - pigallery2-db    
    environment:
      - NODE_ENV=production
      - Users-enforcedUsers=[{"name":"myadmin","encryptedPassword":"$$2b$$09$$IsOgbj/OfgnJhN.bjfY7leDA3adfLLtzNQ3OIzqpXhohF.4m4nVWS","role":"4"}]
    networks:
      - proxy  # Für nginx und zukünftigen Traefik
    volumes:
      - "/home/hajo/docker-volumes/pigallery2/config:/app/data/config"
      - /home/hajo/docker-volumes/pigallery2:/app/data/tmp
      - /home/hajo/Photos/2026:/app/data/images/2026:ro
      - /home/hajo/Photos/2025:/app/data/images/2025:ro
