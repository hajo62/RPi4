      - /home/hajo/Photos/2010-2019/2014:/app/data/images/2014:ro
      - /home/hajo/Photos/2010-2019/2013:/app/data/images/2013:ro
      - /home/hajo/Photos/2010-2019/2012:/app/data/images/2012:ro
      - /home/hajo/Photos/2010-2019/2011:/app/data/images/2011:ro
      - /home/hajo/Photos/2010-2019/2010:/app/data/images/2010:ro
      - /home/hajo/Photos/2000-2009/2009:/app/data/images/2009:ro
      - /home/hajo/Photos/2000-2009/2008:/app/data/images/2008:ro
      - /home/hajo/Photos/2000-2009/2007:/app/data/images/2007:ro
      - /home/hajo/Photos/2000-2009/2006:/app/data/images/2006:ro
      - /home/hajo/Photos/2000-2009/2005:/app/data/images/2005:ro
      - /home/hajo/Photos/2000-2009/2004:/app/data/images/2004:ro
      - /home/hajo/Photos/2000-2009/2003:/app/data/images/2003:ro
      - /home/hajo/Photos/2000-2009/2002:/app/data/images/2002:ro
