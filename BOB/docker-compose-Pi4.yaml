      - /home/hajo/Photos/1970-1979:/app/data/images/1970-1979:ro 
      - /home/hajo/Photos/1962-1969:/app/data/images/1962-1969:ro
      - /home/hajo/Photos/Sammelsurium:/app/data/images/1_Sammelsurium:ro
      - /home/hajo/Photos/Eltern:/app/data/images/0_Eltern:ro
      - /home/hajo/Photos/Fotoalben:/app/data/images/2_Fotoalben:ro
    ports:
      - 8001:80
    deploy:
        resources:
            limits:
              memory: 768M
    restart: unless-stopped
    labels:
      # Traefik Labels für zukünftige Nutzung (hajo63.de)
      - "traefik.enable=true"
      - "traefik.http.routers.pigallery2.rule=Host(`pg.hajo63.de`)"
      - "traefik.http.routers.pigallery2.entrypoints=websecure"
      - "traefik.http.routers.pigallery2.tls=true"
      - "traefik.http.routers.pigallery2.tls.certresolver=letsencrypt"
      - "traefik.http.services.pigallery2.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"

  ####################################################################################################
  # PiGallery2 - Datenbank
  ####################################################################################################
  pigallery2-db:
    image: mariadb
    container_name: pigallery2-db
    restart: unless-stopped
    networks:
      - proxy  # Pigallery2 greift über IP zu, daher im gleichen Netzwerk
    volumes:
      - /home/hajo/docker-volumes/pigallery2-mariadb:/var/lib/mysql
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Berlin
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: ${MYSQL_PGUSER}
      MYSQL_PASSWORD: "${MYSQL_PGPASSWORD}"
      MYSQL_DATABASE: "${MYSQL_PGDATABASE}"
    ports:
      - ${MYSQL_PGDATABASEPort}:3306
    healthcheck:
      test:  mysqladmin ping -h 127.0.0.1 -u ${MYSQL_PGUSER} --password=$MYSQL_ROOT_PASSWORD || exit 1
      interval: 30s
      timeout: 5s
      retries: 5 

  # ##################################################
