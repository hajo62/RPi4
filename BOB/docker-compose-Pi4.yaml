  ##################################################
  # Z-Wave JS Server
  ##################################################
  zwave-server:
    image: zwavejs/zwave-js-ui:latest
    container_name: zwave-server
    networks:
      - homeassistant_internal
    ports:
      - 8091:8091
      - 3000:3000
    environment:
      TZ: Europe/Berlin
    volumes:
      - /home/hajo/docker-volumes/zwave-server:/usr/src/app/store 
    devices:
      - /dev/serial/by-id/usb-0658_0200-if00:/dev/zwave
    restart: unless-stopped

  ##################################################
  # GeoIP Update
  ##################################################
  geoip-upd:
    container_name: geoip-upd
    image: maxmindinc/geoipupdate:latest
    restart: unless-stopped
    volumes:
      - /home/hajo/docker-volumes/geoip-upd/geoip2:/usr/share/GeoIP
    environment:
      TZ: "Europe/BERLIN"
      GEOIPUPDATE_ACCOUNT_ID: 682746
      GEOIPUPDATE_LICENSE_KEY: "1vtl5B1YVFtjszjo"
      GEOIPUPDATE_EDITION_IDS: "GeoLite2-City GeoLite2-Country GeoLite2-ASN"    
      GEOIPUPDATE_FREQUENCY: 12                
      GEOIPUPDATE_PRESERVE_FILE_TIMES: 1 

  ##################################################
  # Samba
  ##################################################
  samba:
    image: dperson/samba
    container_name: samba
    environment:
      - TZ=Europe/Berlin
      - WORKGROUP=WORKGROUP
      - USERID=33
      - GROUPID=33
      - RECYCLE
    networks:
      - default
    ports:
      - "137:137/udp"
      - "138:138/udp"      
      - '139:139/tcp'
      - '445:445/tcp'
    read_only: false
    tmpfs:
      - /tmp
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - /home/hajo/Photos:/mnt/Photos
    command:
      -u "HAJO;HAJO"    
      -s "photos;/mnt/Photos;yes;no;no;all;'none';'none';'Photos'"
      -S 
      -p

  ##################################################
  # PhotoPrism
  ##################################################
  photoprism:
    image: photoprism/photoprism:arm64
    container_name: photoprism
    depends_on:
      - photoprism-mariadb
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    ports:
      - "2342:2342"
    environment:
      PHOTOPRISM_ADMIN_USER: "admin"
      PHOTOPRISM_ADMIN_PASSWORD: "insecure"
      PHOTOPRISM_AUTH_MODE: "password"
      PHOTOPRISM_SITE_URL: "http://192.168.178.3:2342/"
      PHOTOPRISM_ORIGINALS_LIMIT: 5000
      PHOTOPRISM_HTTP_COMPRESSION: "none"
      PHOTOPRISM_WORKERS: 2
      PHOTOPRISM_LOG_LEVEL: "info"
      PHOTOPRISM_READONLY: "false"
      PHOTOPRISM_EXPERIMENTAL: "false"
      PHOTOPRISM_DISABLE_CHOWN: "false"
      PHOTOPRISM_DISABLE_WEBDAV: "false"
      PHOTOPRISM_DISABLE_SETTINGS: "false"
      PHOTOPRISM_DISABLE_TENSORFLOW: "false"
      PHOTOPRISM_DISABLE_FACES: "false"
      PHOTOPRISM_DISABLE_CLASSIFICATION: "false"
      PHOTOPRISM_DISABLE_RAW: "false"
      PHOTOPRISM_RAW_PRESETS: "false"
      PHOTOPRISM_JPEG_QUALITY: 85
      PHOTOPRISM_DETECT_NSFW: "false"
      PHOTOPRISM_UPLOAD_NSFW: "true"
      PHOTOPRISM_DATABASE_DRIVER: "mysql"
      PHOTOPRISM_DATABASE_SERVER: "192.168.178.3:3311"
      PHOTOPRISM_DATABASE_NAME: "photoprism"
      PHOTOPRISM_DATABASE_USER: "photoprism"
      PHOTOPRISM_DATABASE_PASSWORD: "insecure"
      PHOTOPRISM_SITE_CAPTION: "AI-Powered Photos App"
      PHOTOPRISM_SITE_DESCRIPTION: ""
      PHOTOPRISM_SITE_AUTHOR: ""
    working_dir: "/photoprism"
    volumes:
      - "/home/hajo/Photos/For_Immich:/photoprism/originals"
      - "/home/hajo/docker-volumes/photoprism/storage:/photoprism/storage"

  ##################################################
  # PhotoPrism - Datenbank
  ##################################################
  photoprism-mariadb:
    restart: unless-stopped
    image: arm64v8/mariadb:10.10
    security_opt:
      - seccomp:unconfined
      - apparmor:unconfined
    ports:
      - 3311:3306  
    command: mysqld --innodb-buffer-pool-size=256M --transaction-isolation=READ-COMMITTED --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max-connections=512 --innodb-rollback-on-timeout=OFF --innodb-lock-wait-timeout=120
    volumes:
      - "/home/hajo/docker-volumes/photoprism-mariadb:/var/lib/mysql"
    environment:
      MARIADB_AUTO_UPGRADE: "1"
      MARIADB_INITDB_SKIP_TZINFO: "1"
      MARIADB_DATABASE: "photoprism"
      MARIADB_USER: "photoprism"
      MARIADB_PASSWORD: "insecure"
      MARIADB_ROOT_PASSWORD: "insecure"

  ##################################################
  # DigiKam
  ##################################################
  digikam:
    image: lscr.io/linuxserver/digikam:latest
    container_name: digikam
    environment:
      TZ: Europe/Berlin
      PUID: 33
      PGID: 33
      KEYBOARD: de-de-qwertz
    volumes:
      - /home/hajo/docker-volumes/digikam:/config
      - "/home/hajo/docker-volumes/nextcloud/data/hajo/files/Photos/For_Digikam:/data"
    ports:
      - 4000:3000
    restart: unless-stopped

  ##################################################
  # PiGallery3
  ##################################################
  pigallery3:
    image: bpatrik/pigallery2:edge-alpine
    command: sh -c 'bin/wait-for 192.168.178.3:3312 -- --Server-Database-mysql-host=192.168.178.3 --Server-Database-mysql-username=${MYSQL_PGUSER} --Server-Database-mysql-password="${MYSQL_PGPASSWORD}" --Server-Database-mysql-database="${MYSQL_PGDATABASE}"'
    container_name: pigallery3
    depends_on:
      - pigallery3-mariadb    
    environment:
      - NODE_ENV=production
    volumes:
      - /home/hajo/docker-volumes/pigallery3/config:/app/data/config
      - /home/hajo/docker-volumes/pigallery3:/app/data/tmp
      - /home/hajo/docker-volumes/nextcloud/data/hajo/files/Photos/2024:/app/data/images/2024:ro
      - /home/hajo/docker-volumes/nextcloud/data/hajo/files/Photos/2010-2019/2014:/app/data/images/2014:ro
    ports:
      - 8002:80
    restart: unless-stopped

  ##################################################
  # PiGallery3 - Datenbank
  ##################################################
  pigallery3-mariadb:
    image: mariadb
    container_name: pigallery3-mariadb
    restart: unless-stopped
    volumes:
      - /home/hajo/docker-volumes/pigallery3-mariadb:/var/lib/mysql
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Berlin
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_USER: ${MYSQL_PGUSER}
      MYSQL_PASSWORD: "${MYSQL_PGPASSWORD}"
      MYSQL_DATABASE: "${MYSQL_PGDATABASE}"
    ports:
      - 3312:3306
    healthcheck:
      test:  mysqladmin ping -h 127.0.0.1 -u ${MYSQL_PGUSER} --password=$MYSQL_ROOT_PASSWORD || exit 1
      interval: 30s
      timeout: 5s
      retries: 5 

  ##################################################
  # This week in past
  ##################################################
  this-week-in-past:
    image: rouhim/this-week-in-past:1.31.26
    container_name: this-week-in-past
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    restart: unless-stopped
    volumes:
      - /home/hajo/Photos:/resources:ro
    ports:
      - "8180:8080"
    environment:
      BIGDATA_CLOUD_API_KEY: ${THIS_WEEK_IN_PAST_BIGDATA_CLOUD_API_KEY}
      DATE_FORMAT: '%a %d.%m.%Y'
      IGNORE_FOLDER_MARKER_FILES: '.twipignore'
      IGNORE_FOLDER_REGEX: '.*(I|i)gnor(e|ieren)|.*(P|p)rivat|.*Originale|.*xcf|.*Originale und xcf'
      OPEN_WEATHER_MAP_API_KEY: ${THIS_WEEK_IN_PAST_OPEN_WEATHER_MAP_API_KEY}
      PRELOAD_IMAGES: true
      RESOURCE_PATHS: /resources/2025,/resources/2024,/resources/2023,/resources/2022,/resources/2021,/resources/2020,/resources/2010-2019,/resources/2000-2009,/resources/1990-1999,/resources/1980-1989,/resources/1970-1979,/resources/1962-1969,/resources/Fotoalben
      RUST_BACKTRACE: full
      RUST_LOG: debug
      SHOW_HIDE_BUTTON: true
      SLIDESHOW_INTERVAL: 120
      TZ: Europe/Berlin
      LANG: de_DE.UTF-8
      LANGUAGE: de_DE.UTF-8
      LC_TIME: de_DE.UTF-8
      LC_ALL: de_DE.UTF-8
      WEATHER_ENABLED: true
      WEATHER_LANGUAGE: de
      PUID: 33
      PGID: 33

